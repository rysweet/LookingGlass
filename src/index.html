<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alice 3 Web Viewer – Prototype</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; display: flex; height: 100vh; background: #1a1a2e; color: #eee; }

    #sidebar {
      width: 280px; min-width: 200px;
      background: #16213e; padding: 16px;
      display: flex; flex-direction: column; gap: 12px;
      overflow-y: auto;
    }
    #sidebar h1 { font-size: 1.1rem; color: #e94560; }
    #sidebar label { font-size: 0.85rem; color: #aaa; }
    #status { font-size: 0.8rem; color: #0f3460; background: #e2e2e2; padding: 6px 8px; border-radius: 4px; }
    #webxr-status { font-size: 0.78rem; color: #0f3460; background: #d8eef8; padding: 6px 8px; border-radius: 4px; }
    #webxr-status button { width: 100%; margin-bottom: 6px; padding: 4px 6px; }
    #webxr-status ul { margin-top: 4px; padding-left: 16px; }
    #object-list { list-style: none; font-size: 0.82rem; line-height: 1.6; }
    #object-list li { padding: 2px 0; border-bottom: 1px solid #1a1a3e; }
    #object-list small { color: #888; }

    #viewport-container { flex: 1; position: relative; }
    #viewport { width: 100%; height: 100%; display: block; }
  </style>
</head>
<body>
  <div id="sidebar">
    <h1>🐇 Alice 3 Web Viewer</h1>
    <label>Load .a3p project file:
      <input id="file-input" type="file" accept=".a3p" />
    </label>
    <div id="status">No project loaded</div>
    <div id="webxr-status">
      <button type="button" data-alice-webxr-vr-button="disabled" disabled>VR unavailable</button>
      <div data-alice-webxr-status="idle">Load an Alice scene to check VR support.</div>
      <ul data-alice-webxr-evidence="true"></ul>
    </div>
    <h2 style="font-size:0.9rem; margin-top:8px;">Scene Objects</h2>
    <ul id="object-list"></ul>
  </div>
  <div id="viewport-container">
    <canvas id="viewport"></canvas>
  </div>
  <script type="module" src="./main.ts"></script>
</body>
</html>
